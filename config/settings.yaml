tomcat:
  catalina_out: /opt/tomcat/logs/catalina.out
  access_log: /opt/tomcat/logs/localhost_access_log.*.txt
  service_name: tomcat
  setenv_sh: /opt/tomcat/bin/setenv.sh
  webapps_url: http://localhost:8080
  health_check_path: /

java:
  home: /usr/lib/jvm/java-11-openjdk
  # Initial heap; agent will increase this on OOM events
  initial_heap_mb: 512
  heap_increment_mb: 500

database:
  host: localhost
  port: 5432
  # Used for connectivity check via socket (no credentials needed)
  # Sample DB installed by scripts/install_sample_db.sh

bedrock:
  # AWS region where Bedrock is enabled for your account
  # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION loaded from .env
  region: us-east-1

  # Claude Sonnet model ID on Bedrock.
  # Use the cross-region inference profile (us.*) for higher availability.
  # Options:
  #   us.anthropic.claude-sonnet-4-5-20250514-v1:0   (Claude Sonnet 4.5 — latest)
  #   us.anthropic.claude-3-5-sonnet-20241022-v2:0   (Claude 3.5 Sonnet v2)
  model_id: anthropic.claude-sonnet-4-20250514-v1:0

  # Tokens to generate for the action decision (decision JSON is ~100 tokens)
  max_tokens: 1024

agent:
  poll_interval_seconds: 30
  state_db: /var/lib/middleware-agent/state.db
  dumps_dir: /var/lib/middleware-agent/dumps

thresholds:
  http500_window_seconds: 120
  http500_min_count: 5
  oom_max_occurrences_before_notify: 2
  npe_max_restarts_before_notify: 2

email:
  smtp_host: smtp.company.com
  smtp_port: 587
  smtp_user: middleware-agent@company.com
  # SMTP_PASSWORD loaded from env
  from_addr: middleware-agent@company.com
  admin_addrs:
    - admin1@company.com
    - admin2@company.com
  use_tls: true
